<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>button1</title>
</head>
<body>
<style>
    body{background: #000}
    .btn-draw {
        position: relative;
        display: inline-block;
        color: #ffffff;
        border-bottom: 2px solid #ffffff;
        cursor: pointer;
        overflow: hidden;
        transition: color 0.2s ease-in-out, background-color 0.2s ease-in-out;
        margin-top: 40px;

    }
    .btn-draw:after {
        content: '';
        position: absolute;
        right: 0;
        bottom: 0;
        height: 100%;
        width: 2px;
        background: #ffffff;
        transform: translateY(100%);
        transition: transform 0.2s ease-in-out;
        transition-delay: 0.6s;
    }
    .btn-draw > span {
        position: relative;
        display: block;
        padding: 0.5em;
        color: inherit;
    }
    .btn-draw > span:before, .btn-draw > span:after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        background: #ffffff;
        transition: transform 0.2s ease-in-out;
    }
    .btn-draw > span:before {
        height: 2px;
        width: 100%;
        transform: translateX(100%);
        transition-delay: 0.4s;
    }
    .btn-draw > span:after {
        height: 100%;
        width: 2px;
        transform: translateY(-100%);
        transition-delay: 0.2s;
    }
    .btn-draw:hover:after, .btn-draw:hover > span:before, .btn-draw:hover > span:after {
        transform: translate(0, 0);
    }
    .btn-draw:hover:after {
        transition-delay: 0s;
    }
    .btn-draw:hover > span:before {
        transition-delay: 0.2s;
    }
    .btn-draw:hover > span:after {
        transition-delay: 0.4s;
    }
    .btn-draw:hover {
        color: #000000;
        background-color: #ffffff;
        transition-delay: 0.6s;
    }
</style>

<a  class="btn-draw tab" href="#photoset1"><span>photoset</span></a>

</body>
</html>
